<style>

  --green: #5a7d3a;
  --amber: #b07030;
  --blue: #3868a8;
  --purple: #6858a0;
  --rose: #964060;
  --teal: #3a7858;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding: 36px 24px 56px;
}
.icon { width: 1em; height: 1em; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

.page-header {
  text-align: center;
  margin-bottom: 40px;
}
.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: .04em;
  margin-bottom: 6px;
}
.page-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--muted);
}

.diagram-wrap {
  max-width: 880px;
  margin: 0 auto 44px;
}

svg.diagram {
  width: 100%;
  height: auto;
  display: block;
}

.hub-node { cursor: pointer; transition: opacity .2s, transform .2s; }
.hub-node:hover { opacity: .82; }

.detail-panel {
  max-width: 720px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 30px 36px;
  min-height: 240px;
  box-shadow: 0 4px 20px rgba(80,60,20,0.04);
}
.detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--muted2);
  text-transform: uppercase;
}
.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.detail-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--text);
}
.detail-tag {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: .15em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 4px;
}
.detail-sub {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 22px;
}
.pages-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}
.page-row {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 7px;
}
.page-icon-wrap {
  width: 22px; height: 22px;
  border-radius: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--muted);
}
.page-icon-wrap .icon { font-size: 13px; }
.page-body { flex: 1; min-width: 0; }
.page-name { font-size: 12.5px; color: var(--text); margin-bottom: 2px; line-height: 1.3; font-weight: 500; }
.page-type { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); line-height: 1.4; }
</style>

      { icon: "i-paw", name: "Naya", type: "Vet records, routines, her perfect daily walk" },
    ]
  }
};

function selectHub(key) {
  const h = hubs[key];
  document.getElementById('detail-empty').style.display = 'none';
  const content = document.getElementById('detail-content');
  content.style.display = 'block';

  const half = Math.ceil(h.pages.length / 2);
  const col1 = h.pages.slice(0, half);
  const col2 = h.pages.slice(half);

  const makeRows = pages => pages.map(p => `
    <div class="page-row">
      <div class="page-icon-wrap"><svg class="icon"><use href="#${p.icon}"/></svg></div>
      <div class="page-body">
        <div class="page-name">${p.name}</div>
        <div class="page-type">${p.type}</div>
      </div>
    </div>
  `).join('');

  content.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${h.title}</div>
      <span class="detail-tag" style="${h.tagStyle}">${h.tag}</span>
    </div>
    <p class="detail-sub">${h.sub}</p>
    <div class="pages-grid">
      <div>${makeRows(col1)}</div>
      <div>${makeRows(col2)}</div>
    </div>
  `;
}
</script>
</body>
</html>
